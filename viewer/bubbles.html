<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ghsorter bubbles</title>
    <link rel="stylesheet" href="./bubbles.css?v=9" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">ghsorter</div>
        <div class="brand-subtitle">bubbles</div>
      </div>
      <div class="controls">
        <label class="field">
          <span class="label">Store</span>
          <input id="storePath" class="input" value="../.ghsorter_store" />
        </label>
        <button id="reloadBtn" class="btn">Reload</button>
        <a class="btn btn-secondary" href="./">List</a>
        <div class="crumbs" id="crumbs"></div>
      </div>
      <div class="status" id="status"></div>
    </header>

    <main class="stage">
      <canvas id="c"></canvas>
      <div class="hud">
        <div class="hud-title" id="hudTitle"></div>
        <div class="hud-sub" id="hudSub"></div>
        <div class="hud-help">
          <div>Click a bubble to zoom into subtopics.</div>
          <div>Click background or press Esc to go back.</div>
          <div>Scroll to zoom. Drag to pan.</div>
        </div>
      </div>
      <div class="tooltip" id="tip"></div>
    </main>

    <script type="module" src="./bubbles.js?v=9"></script>
  </body>
</html>
